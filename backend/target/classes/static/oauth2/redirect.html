<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
</head>
<body>
<script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    const error = params.get('error');

    if (token) {
        window.location.replace(
            'http://localhost:63342/bank/frontend/dashboard.html?token=' + encodeURIComponent(token)
        );
    } else {
        const msg = error || 'Authentication failed';
        window.location.replace(
            'http://localhost:63342/bank/frontend/login.html?error=' + encodeURIComponent(msg)
        );
    }
</script>
<p style="font-family:sans-serif;text-align:center;margin-top:60px;color:#888">
    Completing authentication...
</p>
</body>
</html>
